name: triptrace

# Inter-container hostnames come from compose DNS: the app reaches Postgres at
# `db` and MinIO at `minio`. In production you can drop the db/minio services
# entirely and point DATABASE_URL at managed Postgres and S3_* at real S3/R2 —
# the app only ever reads env vars.

services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-triptrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triptrace}
      POSTGRES_DB: ${POSTGRES_DB:-triptrace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triptrace} -d ${POSTGRES_DB:-triptrace}"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000" # S3 API (presigned URLs from the browser hit this)
      - "127.0.0.1:9001:9001" # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot bucket bootstrap; exits after creating the bucket.
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 '${S3_ACCESS_KEY:-minioadmin}' '${S3_SECRET_KEY:-minioadmin}' &&
      mc mb -p local/'${S3_BUCKET:-triptrace}'
      "

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-triptrace}:${POSTGRES_PASSWORD:-triptrace}@db:5432/${POSTGRES_DB:-triptrace}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-triptrace}
      S3_REGION: ${S3_REGION:-us-east-1}
      MAP_STYLE_URL: ${MAP_STYLE_URL:-https://tiles.openfreemap.org/styles/liberty}
      NOMINATIM_URL: ${NOMINATIM_URL:-https://nominatim.openstreetmap.org}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  minio-data:
